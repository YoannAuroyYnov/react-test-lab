services:
  db:
    container_name: mysql-db
    image: mysql:9.6
    volumes:
      - ./sqlfiles:/docker-entrypoint-initdb.d
      - ./db_data:/var/lib/mysql

    restart: "on-failure:3"
    environment:
      - MYSQL_ROOT_PASSWORD
    ports:
      - 3306:3306
    healthcheck:
      test:
        - CMD-SHELL
        - mysql -uroot -p"$$MYSQL_ROOT_PASSWORD" -D ynov_ci -Nse "SELECT COUNT(*) FROM users WHERE email='john@example.com';" | grep -q '^1$'
      interval: 10s
      timeout: 5s
      retries: 5

  adminer:
    container_name: adminer
    image: adminer
    restart: "on-failure:3"
    ports:
      - 8080:8080
    depends_on:
      db:
        condition: service_healthy

  api:
    container_name: api_python
    image: api_python
    build:
      context: ./api
    volumes:
      - ./api:/app
    restart: "on-failure:3"
    healthcheck:
      test: "curl -f http://localhost:8000/openapi.json || exit 1"
      interval: 10s
      timeout: 5s
      retries: 5
    environment:
      - MYSQL_HOST=db
      - MYSQL_USER=root
      - MYSQL_PASSWORD
      - MYSQL_DATABASE
    ports:
      - 8000:8000
    depends_on:
      db:
        condition: service_healthy

  web:
    container_name: web_react
    image: web_react
    build:
      context: .
    volumes:
      - .:/app
      - /app/node_modules
    depends_on:
      api:
        condition: service_healthy
    restart: "on-failure:3"
    healthcheck:
      test: "curl -f http://localhost:3000/react-test-lab/ || exit 1"
      interval: 10s
      timeout: 5s
      retries: 5
    ports:
      - 3000:3000
    environment:
      - REACT_APP_API_URL
    command: pnpm start
